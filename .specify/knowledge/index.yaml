# Knowledge Store Index
# Machine-readable index of all rules.
# Used by inject-knowledge script to populate QWEN.md before task execution.
#
# Fields:
#   id:           Unique rule identifier
#   category:     One or more of: angular, backend, testing, versioning, architecture, security
#   text:         One-line summary injected into QWEN.md
#   source_file:  Path to full rule definition (relative to .specify/knowledge/)
#   added:        ISO date rule was created
#   enabled:      Set to false to disable without deleting
#   fire_count:   Times this rule was violated (updated manually after reviews)
#   last_fired:   ISO date of last violation (updated manually after reviews)

rules:
  # Angular
