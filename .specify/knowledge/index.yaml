  # Backend
  - id: BE-001
    category: [backend, architecture]
    text: "External integrations must go through domain interfaces (IBankProvider, IBrokerAdapter) — no concrete adapters in business logic"
    source_file: rules/backend.md
    added: "2026-04-18"
    enabled: true
    fire_count: 0
    last_fired: null

  - id: BE-002
    category: [backend, architecture]
    text: "No cross-module direct coupling — communicate through service boundaries only"
    source_file: rules/backend.md
    added: "2026-04-18"
    enabled: true
    fire_count: 0
    last_fired: null

  - id: BE-003
    category: [backend]
    text: "Each integration module owns its own sync, error handling, and retry logic"
    source_file: rules/backend.md
    added: "2026-04-18"
    enabled: true
    fire_count: 0
    last_fired: null

  - id: BE-004
    category: [backend, security]
    text: "Financial data encrypted at rest (AES-256) and in transit (TLS) — no plaintext in logs or DB"
    source_file: rules/backend.md
    added: "2026-04-18"
    enabled: true
    fire_count: 0
    last_fired: null

  - id: BE-005
