version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: finance-sentry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
      POSTGRES_DB: finance_sentry
    command: postgres -c log_statement=all -c log_duration=on
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - finance-sentry-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_sentry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  finance-sentry-network:
    driver: bridge
