name: Auto-Tag on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/package.json'
      - 'backend/src/FinanceSentry.API/FinanceSentry.API.csproj'

permissions:
  contents: write

jobs:
  create-frontend-tag:
    name: Create Frontend Tag
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/package.json')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get frontend version
        id: version
        run: |
          VERSION=$(cat frontend/package.json | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Frontend version: $VERSION"

      - name: Create frontend tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = `frontend-v${version}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              console.log(`✅ Created tag: ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`ℹ️  Tag ${tag} already exists`);
              } else {
                throw error;
              }
            }

      - name: Create release notes
        uses: softprops/action-gh-release@v1
        with:
          tag_name: frontend-v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          name: Frontend Release ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-backend-tag:
    name: Create Backend Tag
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/src/FinanceSentry.API/FinanceSentry.API.csproj')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get backend API version
        id: version
        run: |
          VERSION=$(grep -m1 "<Version>" backend/src/FinanceSentry.API/FinanceSentry.API.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          if [ -z "$VERSION" ]; then
            echo "❌ ERROR: No <Version> found in FinanceSentry.API.csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Backend API version: $VERSION"

      - name: Create backend tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = `backend-v${version}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              console.log(`✅ Created tag: ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`ℹ️  Tag ${tag} already exists`);
              } else {
                throw error;
              }
            }

      - name: Create release notes
        uses: softprops/action-gh-release@v1
        with:
          tag_name: backend-v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          name: Backend API Release ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
