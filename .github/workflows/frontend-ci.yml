name: Frontend CI

on:
  push:
    branches: [ main, 001-bank-account-sync ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci
      working-directory: frontend

    - name: Lint code
      run: npm run lint
      working-directory: frontend

    - name: Format check
      run: npm run format:check
      working-directory: frontend

    - name: Build application
      run: npm run build
      working-directory: frontend

    # Constitution §II (NON-NEGOTIABLE): test:ci must be configured with coverage thresholds
    # in angular.json (statements/branches/functions/lines all ≥ 80%).
    # Karma will exit non-zero if any threshold is breached, failing the pipeline.
    - name: Run unit tests with coverage gate (Constitution §II)
      run: npm run test:ci
      working-directory: frontend

    - name: Upload coverage
      if: always()
      uses: codecov/codecov-action@v3
      with:
        files: './frontend/coverage/lcov.info'
        flags: frontend
        verbose: true

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-frontend
        path: frontend/coverage/
