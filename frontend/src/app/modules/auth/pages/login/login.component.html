<div class="login-container">
  <div class="login-card">
    <h1>Sign In</h1>
    <p class="subtitle">Finance Sentry</p>

    @if (infoMessage) {
      <cmn-alert variant="info" class="info-alert">{{ infoMessage }}</cmn-alert>
    }

    @if (errorMessage) {
      <cmn-alert variant="error" class="error-alert">{{ errorMessage }}</cmn-alert>
    }

    <div #googleBtn class="google-btn-container"></div>

    <div class="divider"><span>or</span></div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <cmn-form-field
        [errorMessage]="emailError"
        formControlName="email"
        label="Email"
        class="field"
      >
        <cmn-input type="email" placeholder="you@example.com" />
      </cmn-form-field>

      <cmn-form-field
        [errorMessage]="passwordError"
        formControlName="password"
        label="Password"
        class="field"
      >
        <cmn-input type="password" placeholder="••••••••" />
      </cmn-form-field>

      <cmn-button
        [disabled]="loading || form.invalid"
        [loading]="loading"
        type="submit"
        variant="primary"
        class="submit-btn"
        >{{ loading ? 'Signing in…' : 'Sign In' }}</cmn-button
      >
    </form>

    <p class="register-link">Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
</div>
