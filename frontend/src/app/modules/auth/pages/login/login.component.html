<div class="flex items-center justify-center min-h-screen bg-surface-bg">
  <div class="bg-surface-card p-cmn-8 rounded-cmn-md border border-border-default w-full max-w-[440px]">

    <div class="mb-cmn-8">
      <h1 class="font-headline text-cmn-2xl font-bold text-text-primary mb-cmn-1">Secure Access</h1>
      <p class="text-cmn-sm text-text-secondary">Enter your credentials to manage your operational assets.</p>
    </div>

    @if (flashMessage(); as flash) {
      <cmn-alert [variant]="flash.kind" class="block mb-cmn-4">{{ flash.text }}</cmn-alert>
    }

    @if (errorMessage()) {
      <cmn-alert variant="error" class="block mb-cmn-4">{{ errorMessage() }}</cmn-alert>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <cmn-form-field
        [control]="form.get('email')"
        label="EMAIL ADDRESS"
        formControlName="email"
        class="block mb-cmn-5"
      >
        <cmn-input type="email" placeholder="name@organization.com" />
      </cmn-form-field>

      <div class="mb-cmn-6">
        <div class="flex items-center justify-between mb-cmn-1">
          <span class="text-cmn-xs font-medium text-text-secondary tracking-wide uppercase">Password</span>
          <a href="#" class="text-cmn-xs text-accent-default hover:underline no-underline">Forgot?</a>
        </div>
        <cmn-form-field
          [control]="form.get('password')"
          formControlName="password"
        >
          <cmn-input type="password" placeholder="••••••••" />
        </cmn-form-field>
      </div>

      <cmn-button
        [disabled]="loading() || form.invalid"
        [loading]="loading()"
        type="submit"
        variant="primary"
        class="block w-full mb-cmn-6"
        >{{ loading() ? 'Authenticating…' : 'Authenticate →' }}</cmn-button
      >
    </form>

    <div class="flex items-center gap-cmn-3 mb-cmn-6">
      <div class="flex-1 h-px bg-border-default"></div>
      <span class="text-cmn-xs text-text-secondary uppercase tracking-wide">or SSO</span>
      <div class="flex-1 h-px bg-border-default"></div>
    </div>

    <div class="flex justify-center mb-cmn-6">
      <cmn-google-sign-in-button
        [clientId]="googleClientId"
        (credential)="onGoogleCredential($event)"
      />
    </div>

    <p class="text-center text-cmn-sm text-text-secondary">
      Don't have an account?
      <a
        [routerLink]="AppRoute.Register"
        class="text-accent-default no-underline font-medium hover:underline"
        >Create one</a
      >
    </p>
  </div>
</div>
