<div class="flex items-center justify-center min-h-screen bg-surface-bg">
  <div class="bg-surface-card p-cmn-4 rounded-cmn-md shadow-cmn-sm w-full max-w-[400px]">
    <h1 class="font-headline text-cmn-2xl font-bold text-text-primary mb-cmn-1">Sign In</h1>
    <p class="text-cmn-sm text-text-secondary mb-cmn-8">Finance Sentry</p>

    @if (flashMessage(); as flash) {
      <cmn-alert [variant]="flash.kind" class="block mb-cmn-4">{{ flash.text }}</cmn-alert>
    }

    @if (errorMessage()) {
      <cmn-alert variant="error" class="block mb-cmn-4">{{ errorMessage() }}</cmn-alert>
    }

    <div class="flex justify-center mb-cmn-6">
      <cmn-google-sign-in-button
        [clientId]="googleClientId"
        (credential)="onGoogleCredential($event)"
      />
    </div>

    <div class="flex items-center gap-cmn-3 mb-cmn-6">
      <div class="flex-1 h-px bg-border-default"></div>
      <span class="text-cmn-xs text-text-secondary">or</span>
      <div class="flex-1 h-px bg-border-default"></div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <cmn-form-field
        [control]="form.get('email')"
        label="Email"
        formControlName="email"
        class="block mb-cmn-5"
      >
        <cmn-input type="email" placeholder="you@example.com" />
      </cmn-form-field>

      <cmn-form-field
        [control]="form.get('password')"
        label="Password"
        formControlName="password"
        class="block mb-cmn-6"
      >
        <cmn-input type="password" placeholder="••••••••" />
      </cmn-form-field>

      <cmn-button
        [disabled]="loading() || form.invalid"
        [loading]="loading()"
        type="submit"
        variant="primary"
        class="block w-full"
        >{{ loading() ? 'Signing in…' : 'Sign In' }}</cmn-button
      >
    </form>

    <p class="mt-cmn-6 text-center text-cmn-sm text-text-secondary">
      Don't have an account?
      <a
        [routerLink]="AppRoute.Register"
        class="text-accent-default no-underline font-medium hover:underline"
        >Create one</a
      >
    </p>
  </div>
</div>
