<p class="text-cmn-sm text-text-secondary">
  Holdings and transaction data fetched from
  <strong class="text-text-primary">{{ data.providerName }}</strong>
  will be removed from Finance Sentry. You can reconnect at any time.
</p>

<cmn-dialog-actions align="end">
  <cmn-button (clicked)="cancel()" variant="secondary">Cancel</cmn-button>
  <cmn-button (clicked)="confirm()" variant="destructive">Disconnect</cmn-button>
</cmn-dialog-actions>
