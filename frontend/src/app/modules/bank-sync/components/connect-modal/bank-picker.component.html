<div class="flex flex-col gap-cmn-6">
  <p class="text-cmn-sm text-text-secondary">Choose your bank provider.</p>

  <div class="flex flex-col gap-cmn-3">
    @for (provider of providers; track provider.slug) {
      <cmn-selectable-card (clicked)="select(provider.slug)" orientation="horizontal">
        <img
          [ngSrc]="provider.iconAsset"
          [alt]="provider.displayName + ' logo'"
          leading
          width="40"
          height="40"
          class="w-10 h-10 rounded-cmn-sm object-contain"
        />
        <span class="font-medium text-text-primary">{{ provider.displayName }}</span>
        <span class="text-cmn-xs text-text-secondary">{{ provider.description }}</span>
        @if (connected().has(provider.slug)) {
          <cmn-tag trailing variant="success">Connected</cmn-tag>
        }
      </cmn-selectable-card>
    }
  </div>

  <cmn-dialog-actions align="start">
    <cmn-button (clicked)="back()" variant="secondary" icon="ArrowLeft">Back</cmn-button>
  </cmn-dialog-actions>
</div>
